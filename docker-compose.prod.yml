services:
  nas-partner:
    image: ghcr.io/magiczheng/nas-partner:latest
    container_name: nas-partner
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - SERVER_PORT=8080
      - DB_PATH=/app/data/nas-partner.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    restart: unless-stopped
