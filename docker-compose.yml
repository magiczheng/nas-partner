services:
  nas-partner:
    build: .
    container_name: nas-partner
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/host/proc:ro
    user: "0:0"
    environment:
      - SERVER_PORT=8080
      - DB_PATH=/app/data/nas-partner.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - HOST_PROC=/host/proc
    restart: unless-stopped
